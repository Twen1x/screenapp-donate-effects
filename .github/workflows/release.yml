name: Release

# Сборка .exe и публикация релиза на GitHub при пуше тега вида v1.2.3
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ScreenApp.sln

      - name: Test
        run: dotnet test ScreenApp.sln -c Release --no-restore --nologo

      - name: Publish single-file exe
        run: dotnet publish ScreenApp/ScreenApp.csproj /p:PublishProfile=win-x64

      - name: Stage artifact
        shell: pwsh
        run: |
          $exe = "ScreenApp/bin/Release/net8.0-windows/win-x64/publish/ScreenApp.exe"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item $exe dist/ScreenApp.exe

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenApp-exe
          path: dist/ScreenApp.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ScreenApp.exe
          generate_release_notes: true
